<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="description" content="JobCost Pro — Offline job cost management. No backend, no cloud." />
  <meta name="theme-color" content="#0b0f17" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f4f6fb" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JobCost Pro" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>JobCost Pro</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script type="module" src="app.js"></script>
</head>

<body>
  <a class="skip" href="#appContent">Skip to content</a>

  <div id="appShell" class="app">
    <aside id="sidebar" class="sidebar" aria-label="Sidebar navigation">
      <div class="brand" role="banner">
        <div class="brandMark" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path
              d="M4 7.5C4 6.12 5.12 5 6.5 5h11C18.88 5 20 6.12 20 7.5v9c0 1.38-1.12 2.5-2.5 2.5h-11C5.12 19 4 17.88 4 16.5v-9Z"
              stroke="currentColor" stroke-width="1.6" />
            <path d="M7 9h10M7 12h6M7 15h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          </svg>
        </div>
        <div class="brandTxt">
          <div class="brandName">JobCost Pro</div>
          <div class="brandSub">Offline Job Management</div>
        </div>
      </div>

      <nav class="nav" aria-label="Main">
        <button type="button" class="navItem" data-route="dashboard" aria-label="Dashboard">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 13h7V4H4v9Zm9 7h7V11h-7v9ZM4 20h7v-5H4v5Zm9-11h7V4h-7v5Z" stroke="currentColor"
                stroke-width="1.6" stroke-linejoin="round" />
            </svg>
          </span>
          <span>Dashboard</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="jobs" aria-label="Jobs">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7 7h10M7 12h10M7 17h7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              <path d="M5 4h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" stroke="currentColor"
                stroke-width="1.6" />
            </svg>
          </span>
          <span>Jobs</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="clients" aria-label="Clients">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.6" />
              <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.6" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" />
            </svg>
          </span>
          <span>Clients</span>
        </button>
        <button type="button" class="navItem" data-route="field" aria-label="Field">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6" />
              <path
                d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
          </span>
          <span>Field</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="templates" aria-label="Templates">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7 3h10v6H7V3Z" stroke="currentColor" stroke-width="1.6" />
              <path d="M5 9h14v12H5V9Z" stroke="currentColor" stroke-width="1.6" />
              <path d="M8 13h8M8 16h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
          </span>
          <span>Templates</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="views" aria-label="Analytics">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M3 3v18h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              <path d="M7 16l4-5 4 3 4-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </span>
          <span>Analytics</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="estimates" aria-label="Estimates">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" stroke="currentColor"
                stroke-width="1.6" stroke-linecap="round" />
              <rect x="9" y="3" width="6" height="4" rx="1" stroke="currentColor" stroke-width="1.6" />
              <path d="M9 12h6M9 16h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
          </span>
          <span>Estimates</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="kanban" aria-label="Pipeline">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3" y="4" width="5" height="16" rx="1" stroke="currentColor" stroke-width="1.6" />
              <rect x="10" y="4" width="5" height="10" rx="1" stroke="currentColor" stroke-width="1.6" />
              <rect x="17" y="4" width="4" height="7" rx="1" stroke="currentColor" stroke-width="1.6" />
            </svg>
          </span>
          <span>Pipeline</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="crew" aria-label="Crew">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c1.66 0 3 1.34 3 3s-1.34 3-3 3Zm-8 0C6.34 11 5 9.66 5 8s1.34-3 3-3-1.34 3-3 3Zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5Zm8 0c-.29 0-.62.02-.97.05C16.19 15.29 17 16.27 17 17.5V19h6v-2.5c0-2.33-4.67-3.5-7-3.5Z"
                stroke="currentColor" stroke-width="1.6" fill="none" />
            </svg>
          </span>
          <span>Crew</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="inventory" aria-label="Inventory">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z" stroke="currentColor"
                stroke-width="1.6" />
              <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" stroke="currentColor" stroke-width="1.6" />
              <path d="M12 12v5M9.5 14.5h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
          </span>
          <span>Inventory</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="settings" aria-label="Settings">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37a1.724 1.724 0 0 0 2.572-1.065z"
                stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6" />
            </svg>
          </span>
          <span>Settings</span>
        </button>
      </nav>

      <div class="sidebarFooter">
        <div class="hint">Local · Offline · No backend</div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar" aria-label="Top bar">
        <button type="button" id="btnMobileMenu" class="iconBtn mobileOnly" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </button>

        <div class="searchWrap" role="search">
          <svg class="searchIco" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="1.6" />
            <path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          </svg>
          <input id="globalSearch" class="search" type="search" placeholder="Search jobs, clients… (Ctrl+K)"
            aria-label="Global search" autocomplete="off" />
          <button type="button" id="btnClearSearch" class="iconBtn ghost" aria-label="Clear search">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7 7l10 10M17 7 7 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </button>
        </div>

        <div class="topActions">
          <button type="button" id="btnNewJob" class="btn primary admin-only" title="New Job (Ctrl+N)">
            <span class="btnIco" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
            </span>
            <span>New Job</span>
          </button>
          <button type="button" id="btnNewTemplate" class="btn admin-only" title="New Template">
            <span class="btnIco" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M7 3h10v6H7V3Z" stroke="currentColor" stroke-width="1.6" />
                <path d="M12 11v10M7 16h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              </svg>
            </span>
            <span class="desktopOnly">Template</span>
          </button>
          <button type="button" id="btnExportAll" class="btn admin-only" title="Export JSON backup">
            <span class="btnIco" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 3v10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M8 9l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                  stroke-linejoin="round" />
                <path d="M5 21h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
            </span>
            <span class="desktopOnly">Export</span>
          </button>
          <button type="button" id="btnTheme" class="iconBtn" aria-label="Toggle theme" title="Toggle light/dark theme">
            <svg id="themeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M21 12.8A8.5 8.5 0 0 1 11.2 3 7 7 0 1 0 21 12.8Z" stroke="currentColor" stroke-width="1.6"
                stroke-linejoin="round" />
            </svg>
          </button>
          <span id="offlineIndicator" class="offlineIndicator" title="Online" aria-label="Connection status: online"></span>
        </div>
      </header>

      <main id="appContent" class="content" tabindex="-1" aria-label="Main content">
        <!-- rendered by app.js -->
      </main>
    </div>
  </div>

  <div id="drawerOverlay" class="overlay" hidden></div>
  <div id="toasts" class="toasts" aria-live="polite" aria-relevant="additions"></div>
  <div id="modalRoot" class="modalRoot"></div>

  <noscript>
    <div class="noscript">This application requires JavaScript to be enabled.</div>
  </noscript>
</body>

</html>
