<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="description" content="JobCost Pro — Gestão de jobs offline. Sem backend, sem nuvem." />
  <meta name="theme-color" content="#0b0f17" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f4f6fb" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JobCost Pro" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>JobCost Pro</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <a class="skip" href="#appContent">Pular para o conteúdo</a>

  <div id="appShell" class="app">
    <aside id="sidebar" class="sidebar" aria-label="Navegação lateral">
      <div class="brand" role="banner">
        <div class="brandMark" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M4 7.5C4 6.12 5.12 5 6.5 5h11C18.88 5 20 6.12 20 7.5v9c0 1.38-1.12 2.5-2.5 2.5h-11C5.12 19 4 17.88 4 16.5v-9Z" stroke="currentColor" stroke-width="1.6"/>
            <path d="M7 9h10M7 12h6M7 15h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brandTxt">
          <div class="brandName">JobCost Pro</div>
          <div class="brandSub">Gestão Offline de Jobs</div>
        </div>
      </div>

      <nav class="nav" aria-label="Principal">
        <button type="button" class="navItem" data-route="dashboard" aria-label="Dashboard">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M4 13h7V4H4v9Zm9 7h7V11h-7v9ZM4 20h7v-5H4v5Zm9-11h7V4h-7v5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          </span>
          <span>Dashboard</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="jobs" aria-label="Jobs">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M7 7h10M7 12h10M7 17h7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M5 4h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.6"/></svg>
          </span>
          <span>Jobs</span>
        </button>
        <button type="button" class="navItem" data-route="field" aria-label="Campo">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </span>
          <span>Campo</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="templates" aria-label="Templates">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M7 3h10v6H7V3Z" stroke="currentColor" stroke-width="1.6"/><path d="M5 9h14v12H5V9Z" stroke="currentColor" stroke-width="1.6"/><path d="M8 13h8M8 16h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </span>
          <span>Templates</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="views" aria-label="Analytics">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M3 3v18h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M7 16l4-5 4 3 4-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span>Analytics</span>
        </button>
        <button type="button" class="navItem admin-nav" data-route="settings" aria-label="Configurações">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 15a7.9 7.9 0 0 0 .1-6l2-1.2-2-3.4-2.3 1a8.2 8.2 0 0 0-5.2-2l-.5-2.5H9.5L9 3.4a8.2 8.2 0 0 0-5.2 2l-2.3-1-2 3.4 2 1.2a7.9 7.9 0 0 0 .1 6l-2 1.2 2 3.4 2.3-1a8.2 8.2 0 0 0 5.2 2l.5 2.5h4l.5-2.5a8.2 8.2 0 0 0 5.2-2l2.3 1 2-3.4-2-1.2Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" opacity=".75"/></svg>
          </span>
          <span>Configurações</span>
        </button>
      </nav>

      <div class="sidebarFooter">
        <div class="hint">Local · Offline · Sem backend</div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar" aria-label="Barra superior">
        <button type="button" id="btnMobileMenu" class="iconBtn mobileOnly" aria-label="Abrir menu">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>

        <div class="searchWrap" role="search">
          <svg class="searchIco" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="1.6"/>
            <path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input id="globalSearch" class="search" type="search" placeholder="Buscar jobs, clientes… (Ctrl+K)" aria-label="Busca global" autocomplete="off" />
          <button type="button" id="btnClearSearch" class="iconBtn ghost" aria-label="Limpar busca">
            <svg viewBox="0 0 24 24" fill="none"><path d="M7 7l10 10M17 7 7 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>

        <div class="topActions">
          <button type="button" id="btnNewJob" class="btn primary admin-only" title="Novo Job (Ctrl+N)">
            <span class="btnIco" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </span>
            <span>Novo Job</span>
          </button>
          <button type="button" id="btnNewTemplate" class="btn admin-only" title="Novo Template">
            <span class="btnIco" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none"><path d="M7 3h10v6H7V3Z" stroke="currentColor" stroke-width="1.6"/><path d="M12 11v10M7 16h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </span>
            <span class="desktopOnly">Template</span>
          </button>
          <button type="button" id="btnExportAll" class="btn admin-only" title="Exportar backup (JSON)">
            <span class="btnIco" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M8 9l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 21h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </span>
            <span class="desktopOnly">Exportar</span>
          </button>
          <button type="button" id="btnTheme" class="iconBtn" aria-label="Alternar tema" title="Alternar tema claro/escuro">
            <svg id="themeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M21 12.8A8.5 8.5 0 0 1 11.2 3 7 7 0 1 0 21 12.8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </header>

      <main id="appContent" class="content" tabindex="-1" aria-label="Conteúdo principal">
        <!-- renderizado pelo app.js -->
      </main>
    </div>
  </div>

  <div id="drawerOverlay" class="overlay" hidden></div>
  <div id="toasts" class="toasts" aria-live="polite" aria-relevant="additions"></div>
  <div id="modalRoot" class="modalRoot"></div>

  <noscript>
    <div class="noscript">Este aplicativo requer JavaScript habilitado.</div>
  </noscript>
</body>
</html>
